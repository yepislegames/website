   @keyframes neonPulse {

}

/* Follow us neon effect */
.follow-neon {
    color: #fff; /* Beyaz yazı */
    font-weight: bold;
    font-size: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #fff;
    animation: followNeonPulse 2s infinite alternate;
}

@keyframes followNeonPulse {
    0% {
        text-shadow:
            0 0 5px #fff,
            0 0 10px #fff,
            0 0 20px #fff;
        opacity: 0.7;
    }
    50% {

    }
    100% {

            0 0 10px #fff,
            0 0 20px #fff;
        opacity: 0.8;
    }
}
