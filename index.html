   @keyframes neonPulse {
    0% {
        text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff;
        opacity: 0.8;
    }
    50% {
        text-shadow:
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff,
        0 0 80px #ff00ff;
        opacity: 1;
    }
    100% {
        text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff;
        opacity: 0.85;
    }


}
@keyframes purpleNeon {
  0% {
    text-shadow:
      0 0 6px #a855f7,
      0 0 12px #9333ea,
      0 0 24px #7c3aed;
    opacity: 0.85;
  }
  100% {
    text-shadow:
      0 0 10px #c084fc,
      0 0 20px #a855f7,
      0 0 40px #7c3aed,
      0 0 80px #6d28d9;
    opacity: 1;
  }
}
.hero-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 64px;
  letter-spacing: 4px;

  color: #f5e9ff;
  animation: purpleNeon 2.5s infinite alternate;
  background: rgba(120, 60, 180, 0.15);
  padding: 20px 40px;
  border-radius: 16px;
  backdrop-filter: blur(6px);
}
.hero-title {

/* Neon efektli slogan */

/* Neon efektli slogan açık mor */
.hero-slogan {
    color: #fff; /* ana yazı beyaz */
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
    letter-spacing: 1.5px;
    text-shadow:
        0 0 5px #d8b3ff,
        0 0 10px #d8b3ff,
        0 0 20px #d8b3ff,
        0 0 40px #b788ff,
        0 0 80px #b788ff;
    animation: neonGlow 2s ease-in-out infinite alternate;
}

/* Neon parlama animasyonu */
@keyframes neonGlow {
    0% {
        text-shadow:
            0 0 5px #d8b3ff,
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 40px #b788ff,
            0 0 80px #b788ff;
    }
    50% {
        text-shadow:
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 30px #d8b3ff,
            0 0 50px #b788ff,
            0 0 100px #b788ff;
    }
    100% {
        text-shadow:
            0 0 5px #d8b3ff,
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 40px #b788ff,
            0 0 80px #b788ff;
    }
}
.hero-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 35px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(90deg, #a855f7, #9333ea);
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.7), 0 0 30px rgba(147, 51, 234, 0.5);
    transition: all 0.3s ease-in-out;
}

.hero-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(168, 85, 247, 0.9), 0 0 50px rgba(147, 51, 234, 0.7);
}



.video-hero {
    position: relative;
    overflow: hidden;
}

.bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay — yazıların okunaklı kalması için */
.video-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(128, 0, 128, 0.55); /* Siyah yerine mor overlay */
    z-index: -1;
}

/* Yazıları öne al */
.video-hero .container {
    position: relative;
    z-index: 5;
}
