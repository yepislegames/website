	<style>
   @keyframes neonPulse {
    0% {
        text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff;
        opacity: 0.8;
    }
    50% {
        text-shadow:
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff,
        0 0 80px #ff00ff;
        opacity: 1;
    }
    100% {
        text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff;
        opacity: 0.85;
    }


}
@keyframes purpleNeon {
  0% {
    text-shadow:
      0 0 6px #a855f7,
      0 0 12px #9333ea,
      0 0 24px #7c3aed;
    opacity: 0.85;
  }
  100% {
    text-shadow:
      0 0 10px #c084fc,
      0 0 20px #a855f7,
      0 0 40px #7c3aed,
      0 0 80px #6d28d9;
    opacity: 1;
  }
}
.hero-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 64px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #f5e9ff;
  animation: purpleNeon 2.5s infinite alternate;
  background: rgba(120, 60, 180, 0.15);
  padding: 20px 40px;
  border-radius: 16px;
  backdrop-filter: blur(6px);
}
.hero-title {
  margin-top: 93px;
}

/* Neon efektli slogan */

/* Neon efektli slogan açık mor */
.hero-slogan {
    color: #fff; /* ana yazı beyaz */
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
    letter-spacing: 1.5px;
    text-shadow:
        0 0 5px #d8b3ff,
        0 0 10px #d8b3ff,
        0 0 20px #d8b3ff,
        0 0 40px #b788ff,
        0 0 80px #b788ff;
    animation: neonGlow 2s ease-in-out infinite alternate;
}

/* Neon parlama animasyonu */
@keyframes neonGlow {
    0% {
        text-shadow:
            0 0 5px #d8b3ff,
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 40px #b788ff,
            0 0 80px #b788ff;
    }
    50% {
        text-shadow:
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 30px #d8b3ff,
            0 0 50px #b788ff,
            0 0 100px #b788ff;
    }
    100% {
        text-shadow:
            0 0 5px #d8b3ff,
            0 0 10px #d8b3ff,
            0 0 20px #d8b3ff,
            0 0 40px #b788ff,
            0 0 80px #b788ff;
    }
}
.hero-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 35px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(90deg, #a855f7, #9333ea);
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.7), 0 0 30px rgba(147, 51, 234, 0.5);
    transition: all 0.3s ease-in-out;
}

.hero-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(168, 85, 247, 0.9), 0 0 50px rgba(147, 51, 234, 0.7);
}



.video-hero {
    position: relative;
    overflow: hidden;
}

.bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay — yazıların okunaklı kalması için */
.video-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

/* Yazıları öne al */
.video-hero .container {
    position: relative;
    z-index: 5;
}
.play-text {
  margin-top: 25px;
    font-size: 28px;
    color: #fff !important;  /* Beyaz ve override için !important ekledik */
    letter-spacing: 2px;
    text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #b788ff; /* Hafif neon efekti */
    font-weight: bold;
}
/* Video section */
.video-bg-section {
   margin-top: 0; /* üst boşluğu kaldır */
    padding-top: 0;
    background-color: rgba(109, 40, 217, 1); /* artık tamamen opak mor */
}


.video-bg-section .bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: auto;
    height: 100%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: 0;
}

.content-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

.play-wrapper {
    text-align: center;
    padding: 120px 0;
}

.big-play-btn {
   display: inline-flex;
   align-items: center;
   justify-content: center;
   width: 160px;
   height: 160px;
   border-radius: 50%;
   background: radial-gradient(circle, rgba(109,40,217,1) 0%, rgba(128,0,128,1) 100%);
   color: white;
   font-size: 60px;
   text-decoration: none;
   box-shadow: 0 0 20px #a855f7, 0 0 40px #9333ea, 0 0 80px #6d28d9;
   transition: all 0.3s ease;
}

/* Hover animasyon */
.big-play-btn:hover {
    transform: scale(1.15) rotate(5deg);
    box-shadow:
        0 0 40px #ff00ff,
        0 0 80px #ff00ff,
        0 0 120px #6a00ff;
}


.play-text {
    margin-top: 25px;
    font-size: 28px;
    color: black;
    letter-spacing: 2px;
}
 /* HEADER */
.header-section {

}

.header-warp {

    padding: 0;
}

.header-social {

    padding: 0 20px;
}

.header-social p {

}

.header-bar-warp {
    display: flex;
    justify-content: space-between;
    align-items: center; /* dikey ortala */
    margin: 0;
    padding: 0 20px;
}

/* Menü linkleri üst boşluklarını sıfırla */
.main-menu li a {
    margin: 0;
    padding: 0;
}

/* Footer menüyü ortala */
.footer-menu {
    display: flex;              /* linkleri yatay sırala */
    justify-content: center;    /* ortala */
    gap: 30px;                  /* linkler arası boşluk */
    list-style: none;           /* bulletleri kaldır */
    margin: 20px 0;             /* üst-alt boşluk */
    padding: 0;
}

.footer-menu li a {
    text-decoration: none;
    color: #fff;
    font-weight: bold;
    font-size: 20px;
}
/* Footer menüyü yatay ve ortalı yap */
.footer-menu {
    display: flex;               /* linkleri yatay sırala */
    justify-content: center;     /* menüyü ortala */
    align-items: center;         /* dikey ortala */
    gap: 40px;                   /* linkler arası boşluk */
    list-style: none;            /* bulletleri kaldır */
    margin: 20px 0;              /* üst-alt boşluk */
    padding: 0;
}

/* Footer linkleri */
.footer-menu li a {
    text-decoration: none;
    color: #fff;
    font-weight: bold;
    font-size: 24px;             /* footer için uygun font */
    transition: color 0.3s;
}

.footer-menu li a:hover {
    color: #a855f7;              /* hover efekti */
}
/* Ana Menü Elemanlarını Ayır */
.main-menu li {
    display: inline-block;
    margin-right: 35px; /* Linkler arasındaki boşluk */
}

.main-menu li:last-child {
    margin-right: 0; /* Son elemanın sağ boşluğunu kaldır */
}

/* Navigasyon alanını sağa yasla ve hizala */
.top-nav-area {
    display: flex;
    justify-content: flex-end; /* Menüyü sağa iter */
    align-items: center;

/* Mobilde menü linklerinin birbirine girmemesi için padding */
.main-menu li a {

    display: block;
}
/* Body tüm sayfa için mor yap */

}
